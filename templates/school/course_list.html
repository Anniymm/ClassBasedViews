<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
</head>
<body>
<h1>Courses</h1>

<a href="{% url 'course-create' %}">Create New Course</a>

<ul>
    {% for course in courses %}
        <li>
            <a href="{% url 'course-detail' course.id %}">
                {{ course.name }}
            </a>
        </li>
    {% empty %}
        <li>No courses available</li>
    {% endfor %}
</ul>

</body>
</html>
